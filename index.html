<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="description" content="WARZONE SANDBOX - Epic Battle Simulator" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" href="/icons/icon-192.png" />
  <title>WARZONE SANDBOX</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a;color:#fff;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
    #app{position:fixed;top:0;left:0;width:100%;height:100%;overflow:hidden}
    canvas{display:block;position:absolute;top:0;left:0;width:100%;height:100%;z-index:1}

    .screen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .4s ease;z-index:10;pointer-events:auto}
    .screen.hidden{opacity:0;pointer-events:none;z-index:0}

    #splash{background:#0a0a0a;z-index:100}
    #splash .logo{font-size:clamp(2rem,8vw,5rem);font-weight:900;letter-spacing:.3em;text-transform:uppercase;background:linear-gradient(135deg,#ff4444,#ff8800,#ffcc00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:pulse 2s ease-in-out infinite}
    #splash .subtitle{font-size:clamp(.7rem,2vw,1rem);letter-spacing:.5em;color:#666;margin-top:1rem;text-transform:uppercase}
    #splash .loader{width:clamp(200px,60vw,400px);height:3px;background:#222;border-radius:2px;margin-top:3rem;overflow:hidden}
    #splash .loader-bar{width:0%;height:100%;background:linear-gradient(90deg,#ff4444,#ffcc00);border-radius:2px;transition:width .3s ease}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}

    #main-menu{background:transparent}
    #main-menu .menu-bg{position:absolute;top:0;left:0;width:100%;height:100%;z-index:-1}
    #main-menu .menu-content{position:relative;z-index:1;text-align:center;padding:2rem}
    #main-menu h1{font-size:clamp(2.5rem,10vw,6rem);font-weight:900;letter-spacing:.2em;text-transform:uppercase;background:linear-gradient(135deg,#ff4444,#ff8800);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:2rem}
    #main-menu .menu-buttons{display:flex;flex-direction:column;gap:1rem;align-items:center}
    .game-btn{padding:1rem 3rem;font-size:clamp(.9rem,2.5vw,1.2rem);font-weight:700;letter-spacing:.15em;text-transform:uppercase;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#fff;border-radius:8px;cursor:pointer;transition:all .2s ease;min-width:250px;backdrop-filter:blur(10px)}
    .game-btn:active{transform:scale(.96);background:rgba(255,255,255,.15)}
    .game-btn.primary{border-color:#ff6600;background:linear-gradient(135deg,rgba(255,100,0,.3),rgba(255,50,0,.1))}
    .game-btn.primary:active{background:linear-gradient(135deg,rgba(255,100,0,.5),rgba(255,50,0,.3))}

    #army-builder{background:rgba(0,0,0,.7);flex-direction:column;justify-content:flex-end;padding:0}
    #army-builder .builder-top{position:absolute;top:0;left:0;width:100%;padding:env(safe-area-inset-top) 1rem .5rem;display:flex;justify-content:space-between;align-items:center;z-index:5}
    #army-builder .army-label{font-size:1.1rem;font-weight:700;letter-spacing:.1em}
    #army-builder .army-label.red{color:#ff4444}
    #army-builder .army-label.blue{color:#4488ff}
    #army-builder .builder-bottom{position:absolute;bottom:0;left:0;width:100%;padding:0 0 env(safe-area-inset-bottom) 0;z-index:5}
    .unit-carousel{display:flex;gap:.5rem;padding:.8rem 1rem;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .unit-carousel::-webkit-scrollbar{display:none}
    .unit-card{flex:0 0 auto;width:70px;height:90px;border-radius:10px;border:2px solid rgba(255,255,255,.1);background:rgba(0,0,0,.6);backdrop-filter:blur(8px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;scroll-snap-align:center;cursor:pointer;transition:all .2s ease}
    .unit-card.selected{border-color:#ff8800;background:rgba(255,136,0,.15)}
    .unit-card .unit-icon{font-size:1.6rem}
    .unit-card .unit-name{font-size:.55rem;letter-spacing:.08em;text-transform:uppercase;color:#aaa}
    .unit-card.selected .unit-name{color:#ff8800}
    .builder-actions{display:flex;gap:.5rem;padding:.5rem 1rem .8rem;justify-content:center}
    .builder-actions .game-btn{min-width:0;padding:.6rem 1.5rem;font-size:.75rem}
    .formation-tools{display:flex;gap:.4rem;padding:0 1rem .3rem;justify-content:center}
    .formation-btn{width:44px;height:44px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.5);color:#fff;font-size:.65rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
    .formation-btn.selected{border-color:#ff8800;background:rgba(255,136,0,.15)}
    .formation-btn .f-icon{font-size:1rem}
    .unit-count{position:absolute;top:env(safe-area-inset-top);left:50%;transform:translateX(-50%);font-size:.7rem;color:#888;letter-spacing:.1em;padding-top:.3rem}
    .side-indicator{position:absolute;top:env(safe-area-inset-top);right:1rem;font-size:.7rem;letter-spacing:.1em;padding-top:.3rem}

    #battle-screen{background:transparent;pointer-events:none}
    #battle-screen *{pointer-events:auto}
    .battle-hud{position:absolute;top:env(safe-area-inset-top,0);left:0;width:100%;padding:.5rem 1rem;display:flex;justify-content:space-between;align-items:flex-start;z-index:5}
    .army-status{display:flex;flex-direction:column;gap:3px}
    .army-status .label{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;opacity:.6}
    .army-status .count{font-size:1.4rem;font-weight:900}
    .army-status.red .count{color:#ff4444}
    .army-status.blue .count{color:#4488ff}
    .army-status .hp-bar{width:100px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
    .army-status .hp-fill{height:100%;border-radius:2px;transition:width .3s ease}
    .army-status.red .hp-fill{background:linear-gradient(90deg,#ff2222,#ff6644)}
    .army-status.blue .hp-fill{background:linear-gradient(90deg,#2266ff,#44aaff)}
    .battle-center{text-align:center}
    .battle-timer{font-size:1.8rem;font-weight:900;letter-spacing:.1em}
    .battle-subtitle{font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;opacity:.5}
    .battle-controls{position:absolute;bottom:env(safe-area-inset-bottom,0);left:0;width:100%;padding:.5rem 1rem .8rem;display:flex;justify-content:center;gap:.8rem;z-index:5}
    .battle-controls .game-btn{min-width:0;padding:.5rem 1.2rem;font-size:.7rem}
    .speed-btn{width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:rgba(0,0,0,.5);color:#fff;font-size:.6rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .speed-btn.active{border-color:#ff8800;color:#ff8800}

    #results{background:rgba(0,0,0,.85);z-index:20}
    #results h1{font-size:clamp(2rem,8vw,4rem);font-weight:900;letter-spacing:.2em;margin-bottom:1rem}
    #results h1.victory{background:linear-gradient(135deg,#ffcc00,#ff8800);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    #results h1.defeat{background:linear-gradient(135deg,#ff4444,#cc0000);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem 2rem;margin:1.5rem 2rem}
    .stat-item{text-align:center}
    .stat-value{font-size:1.8rem;font-weight:900}
    .stat-label{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;opacity:.5;margin-top:.2rem}

    .minimap{position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 60px);right:1rem;width:clamp(80px,18vw,120px);height:clamp(80px,18vw,120px);border-radius:50%;border:2px solid rgba(255,255,255,.15);background:rgba(0,0,0,.5);backdrop-filter:blur(4px);overflow:hidden;z-index:5}
    .minimap canvas{width:100%;height:100%;border-radius:50%}

    .tooltip{position:absolute;padding:.4rem .8rem;background:rgba(0,0,0,.8);border:1px solid rgba(255,255,255,.1);border-radius:6px;font-size:.65rem;color:#fff;pointer-events:none;z-index:50;white-space:nowrap;opacity:0;transition:opacity .2s}
    .tooltip.visible{opacity:1}

    @media(min-width:768px){
      .unit-card{width:80px;height:100px}
      .unit-card .unit-icon{font-size:2rem}
      .unit-card .unit-name{font-size:.65rem}
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="splash" class="screen">
      <div class="logo">WARZONE</div>
      <div class="subtitle">Battle Sandbox</div>
      <div class="loader"><div class="loader-bar" id="loader-bar"></div></div>
    </div>

    <div id="main-menu" class="screen hidden">
      <div class="menu-content">
        <h1>WARZONE</h1>
        <div class="menu-buttons">
          <button class="game-btn primary" data-action="quick-battle">Quick Battle</button>
          <button class="game-btn" data-action="sandbox">Sandbox Mode</button>
        </div>
      </div>
    </div>

    <div id="army-builder" class="screen hidden">
      <div class="builder-top">
        <span class="army-label red" id="active-side-label">RED ARMY</span>
        <span class="unit-count" id="unit-count-display">0 / 250</span>
        <span class="army-label blue" id="side-toggle" style="cursor:pointer">BLUE →</span>
      </div>
      <div class="builder-bottom">
        <div class="formation-tools" id="formation-tools"></div>
        <div class="unit-carousel" id="unit-carousel"></div>
        <div class="builder-actions">
          <button class="game-btn" data-action="clear-units">Clear</button>
          <button class="game-btn primary" data-action="start-battle">FIGHT!</button>
        </div>
      </div>
    </div>

    <div id="battle-screen" class="screen hidden">
      <div class="battle-hud">
        <div class="army-status red">
          <span class="label">RED ARMY</span>
          <span class="count" id="red-count">0</span>
          <div class="hp-bar"><div class="hp-fill" id="red-hp" style="width:100%"></div></div>
        </div>
        <div class="battle-center">
          <div class="battle-timer" id="battle-timer">00:00</div>
          <div class="battle-subtitle">battle time</div>
        </div>
        <div class="army-status blue">
          <span class="label">BLUE ARMY</span>
          <span class="count" id="blue-count">0</span>
          <div class="hp-bar"><div class="hp-fill" id="blue-hp" style="width:100%"></div></div>
        </div>
      </div>
      <div class="minimap" id="minimap"><canvas id="minimap-canvas"></canvas></div>
      <div class="battle-controls">
        <button class="speed-btn" data-speed="0.5">½×</button>
        <button class="speed-btn active" data-speed="1">1×</button>
        <button class="speed-btn" data-speed="2">2×</button>
        <button class="game-btn" data-action="reset-battle">Reset</button>
        <button class="game-btn" data-action="end-battle">End</button>
      </div>
    </div>

    <div id="results" class="screen hidden">
      <h1 id="result-title" class="victory">VICTORY</h1>
      <div class="stats-grid" id="stats-grid"></div>
      <div class="menu-buttons" style="margin-top:2rem">
        <button class="game-btn primary" data-action="rematch">Rematch</button>
        <button class="game-btn" data-action="menu">Main Menu</button>
      </div>
    </div>

    <canvas id="game-canvas"></canvas>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
